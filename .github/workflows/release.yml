name: Release plugin

on:
    push:
        tags:
            - 'v*'

permissions:
    contents: write

concurrency:
    group: release-${{ github.ref }}
    cancel-in-progress: false

jobs:
    release:
        runs-on: ubuntu-latest
        steps:
            - name: Check out repository
              uses: actions/checkout@v7

            - name: Set up Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm

            - name: Validate release tag
              shell: bash
              run: |
                  package_version="$(node --print "require('./package.json').version")"
                  expected_tag="v${package_version}"

                  if [[ "${GITHUB_REF_NAME}" != "${expected_tag}" ]]; then
                      echo "::error title=Version mismatch::Tag ${GITHUB_REF_NAME} does not match package version ${package_version}."
                      exit 1
                  fi

                  echo "PACKAGE_VERSION=${package_version}" >> "${GITHUB_ENV}"

            - name: Install WP-CLI
              shell: bash
              run: |
                  curl --fail --silent --show-error --location \
                      --output "${RUNNER_TEMP}/wp" \
                      https://github.com/wp-cli/wp-cli/releases/download/v2.12.0/wp-cli-2.12.0.phar
                  chmod +x "${RUNNER_TEMP}/wp"
                  "${RUNNER_TEMP}/wp" --info
                  echo "${RUNNER_TEMP}" >> "${GITHUB_PATH}"

            - name: Install dependencies
              run: npm ci

            - name: Build release archive
              run: npm run export

            - name: Prepare release assets
              shell: bash
              run: |
                  cd dist
                  cp "vova-posts-grid-${PACKAGE_VERSION}.zip" vova-posts-grid.zip
                  sha256sum \
                      "vova-posts-grid-${PACKAGE_VERSION}.zip" \
                      vova-posts-grid.zip > SHA256SUMS

            - name: Publish GitHub Release
              env:
                  GH_TOKEN: ${{ github.token }}
              shell: bash
              run: |
                  gh release create "${GITHUB_REF_NAME}" \
                      "dist/vova-posts-grid-${PACKAGE_VERSION}.zip#Installable WordPress plugin" \
                      "dist/SHA256SUMS#SHA-256 checksum" \
                      --verify-tag \
                      --generate-notes \
                      --title "Vova's Posts Grid ${GITHUB_REF_NAME}"
