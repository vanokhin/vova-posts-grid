<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="robots" content="noindex" />
		<meta name="theme-color" content="#173d2d" />
		<title>Page not found — Posts Grid</title>
		<link
			rel="icon"
			href="/vova-posts-grid/favicon.svg"
			type="image/svg+xml"
		/>

		<!-- Google tag (gtag.js) -->
		<script
			async
			src="https://www.googletagmanager.com/gtag/js?id=G-NX3ZDMY43F"
		></script>
		<script>
			window.dataLayer = window.dataLayer || [];
			function gtag() {
				dataLayer.push( arguments );
			}
			gtag( 'js', new Date() );

			gtag( 'config', 'G-NX3ZDMY43F' );
		</script>
		<style>
			* {
				box-sizing: border-box;
			}
			body {
				display: grid;
				min-height: 100vh;
				padding: 24px;
				margin: 0;
				place-items: center;
				background: #f5f3ec;
				color: #15231b;
				font-family:
					Inter,
					ui-sans-serif,
					-apple-system,
					BlinkMacSystemFont,
					'Segoe UI',
					sans-serif;
			}
			main {
				max-width: 650px;
				text-align: center;
			}
			.mark {
				display: grid;
				grid-template-columns: repeat( 2, 18px );
				gap: 5px;
				width: fit-content;
				padding: 14px;
				margin: 0 auto 38px;
				border-radius: 15px;
				background: #173d2d;
			}
			.mark span {
				width: 18px;
				height: 18px;
				border-radius: 3px;
				background: #d5ff52;
			}
			.number {
				color: #173d2d;
				font-size: 12px;
				font-weight: 800;
				letter-spacing: 0.15em;
			}
			h1 {
				margin: 14px 0 20px;
				font-size: clamp( 52px, 10vw, 90px );
				letter-spacing: -0.06em;
				line-height: 0.95;
			}
			p {
				margin: 0 auto 30px;
				color: #657169;
				font-size: 17px;
				line-height: 1.6;
			}
			a {
				display: inline-flex;
				align-items: center;
				min-height: 50px;
				padding: 0 22px;
				border-radius: 999px;
				background: #173d2d;
				color: #fff;
				font-size: 14px;
				font-weight: 800;
				text-decoration: none;
			}
			a:focus-visible {
				outline: 3px solid #5367ed;
				outline-offset: 4px;
			}
		</style>
	</head>
	<body>
		<main>
			<div class="mark" aria-hidden="true">
				<span></span><span></span><span></span><span></span>
			</div>
			<div class="number">404 / NOTHING IN THIS CELL</div>
			<h1>This post is off the grid.</h1>
			<p>
				The page you were looking for moved, changed, or never made it
				into the query.
			</p>
			<a href="/vova-posts-grid/">Back to Posts Grid</a>
		</main>
	</body>
</html>
